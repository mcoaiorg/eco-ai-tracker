<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco AI Tracker 🌍🤖</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  text-align: center;
}

#loginScreen {
  position: fixed;
  inset: 0;
  background: #e8f5e9;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

input, input[type="file"] {
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 10px;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px;
  width: 90%;
  max-width: 320px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

button {
  padding: 10px;
  margin-top: 10px;
  border: none;
  background: #43a047;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
}

button:hover {
  background: #2e7d32;
}

#score {
  font-size: 22px;
  color: #1b5e20;
}

.bar-container {
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  height: 20px;
}

#bar {
  height: 20px;
  width: 0%;
  background: #2e7d32;
  transition: 0.5s;
}

#chatBox {
  height: 160px;
  overflow-y: auto;
  background: #f1f8e9;
  padding: 10px;
  border-radius: 10px;
  text-align: left;
}

.player {
  text-align: left;
  padding: 5px;
  border-bottom: 1px solid #ddd;
}

img {
  margin-top: 5px;
  border-radius: 10px;
  width: 100%;
  max-width: 150px;
}

@media (max-width: 600px) {
  .card { width: 95%; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>🌍 Eco AI Tracker</h1>
  <input id="username" placeholder="Enter name">
  <button onclick="startApp()">Start 🌱</button>
</div>

<h1>🌍 Eco AI Tracker</h1>
<div id="score">Score: 0</div>

<!-- ACTIONS -->
<div class="container">

  <div class="card">
    <h3>♻️ Recycle Plastic</h3>
    <input type="file" accept="image/*" onchange="uploadImage(event,'Recycle')">
    <button onclick="addPoints(10,'Recycle')">Do Action</button>
  </div>

  <div class="card">
    <h3>💧 Save Water</h3>
    <input type="file" accept="image/*" onchange="uploadImage(event,'Water')">
    <button onclick="addPoints(5,'Water')">Do Action</button>
  </div>

  <div class="card">
    <h3>🌳 Plant Tree</h3>
    <input type="file" accept="image/*" onchange="uploadImage(event,'Tree')">
    <button onclick="addPoints(20,'Tree')">Do Action</button>
  </div>

</div>

<!-- PLANET -->
<div class="card">
  <h3>🌍 Planet Health</h3>
  <div class="bar-container">
    <div id="bar"></div>
  </div>
  <p id="healthText">Earth is weak 💔</p>
</div>

<div class="card">
  <h3>📸 Activity Feed</h3>
  <div id="feed"></div>
</div>

<div class="card">
  <h3>🏆 Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<!-- CHAT -->
<div class="card">
  <h3>🤖 Earth AI</h3>
  <div id="chatBox"></div>
  <input id="chatInput" placeholder="Ask Earth AI...">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- SOUND -->
<audio id="sound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script>

let score = localStorage.getItem("ecoScore")
  ? parseInt(localStorage.getItem("ecoScore"))
  : 0;

let user = "";
let players = JSON.parse(localStorage.getItem("ecoPlayers")) || [];
let images = JSON.parse(localStorage.getItem("ecoImages")) || {};

updateUI();
updateLeaderboard();
updateFeed();

/* LOGIN */
function startApp() {
  user = document.getElementById("username").value || "Player";
  document.getElementById("loginScreen").style.display = "none";
}

/* IMAGE UPLOAD */
function uploadImage(event, type) {
  let file = event.target.files[0];
  let reader = new FileReader();

  reader.onload = function(e) {
    images[type] = e.target.result;
    localStorage.setItem("ecoImages", JSON.stringify(images));
    updateFeed();
  };

  reader.readAsDataURL(file);
}

/* GAME */
function addPoints(val, type) {
  score += val;
  localStorage.setItem("ecoScore", score);

  playSound();
  updateUI();

  if (score % 20 === 0) celebrate();
  if (user) saveScore();
}

/* UI */
function updateUI() {
  document.getElementById("score").innerText = "Score: " + score;

  let percent = Math.min(score, 100);
  document.getElementById("bar").style.width = percent + "%";

  let text = "Earth is weak 💔";
  if (score >= 30) text = "Earth recovering 🌱";
  if (score >= 60) text = "Earth healthy 🌿";
  if (score >= 100) text = "Earth thriving 🌍";

  document.getElementById("healthText").innerText = text;
}

/* FEED */
function updateFeed() {
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  for (let key in images) {
    feed.innerHTML += `
      <p><b>${key}</b></p>
      <img src="${images[key]}">
    `;
  }
}

/* LEADERBOARD */
function saveScore() {
  players.push({ name: user, score: score });
  players.sort((a,b)=>b.score-a.score);
  players = players.slice(0,10);

  localStorage.setItem("ecoPlayers", JSON.stringify(players));
  updateLeaderboard();
}

function updateLeaderboard() {
  let board = document.getElementById("leaderboard");
  board.innerHTML = "";

  players.forEach((p,i)=>{
    board.innerHTML += `<div class="player">${i+1}. ${p.name} - ${p.score}</div>`;
  });
}

/* CHATBOT */
function sendMsg() {
  let input = document.getElementById("chatInput");
  let msg = input.value.toLowerCase();
  input.value = "";

  addChat("You", msg);

  setTimeout(()=>{
    addChat("Earth AI 🤖", getReply(msg));
  },500);
}

function addChat(s,t){
  let box = document.getElementById("chatBox");
  box.innerHTML += `<p><b>${s}:</b> ${t}</p>`;
  box.scrollTop = box.scrollHeight;
}

function getReply(msg){
  if(msg.includes("plastic")) return "Use reusable items ♻️";
  if(msg.includes("water")) return "Save water 💧";
  if(msg.includes("tree")) return "Plant trees 🌳";
  if(score>=100) return "Planet Guardian 🏆";
  return "Help Earth 🌍";
}

/* EFFECTS */
function celebrate(){
  confetti({particleCount:120,spread:70,origin:{y:0.6}});
}

function playSound(){
  let s=document.getElementById("sound");
  s.currentTime=0;
  s.play();
}

</script>

</body>
</html>
